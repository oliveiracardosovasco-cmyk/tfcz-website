:root{
  --blue:#5ca7dc; --navy:#0d273d; --gold:#cda857; --gold2:#e9c475;
  --green:#57A639; --black:#0c0f14; --black-key:rgba(232,238,246,.92);
  --ink:#f3f7fb; --mut:rgba(228,238,248,.62); --dim:rgba(228,238,248,.40);
}
html, body { margin:0; padding:0; width:100vw; height:100vh; background:transparent;
  font-family:'Nunito Sans', system-ui, sans-serif; overflow:hidden; }
body { position:relative; }

/* Board = Fenster-Signatur: frosted Navy, blaue Linie oben / goldene unten */
.board{
  position:absolute; display:grid;
  grid-template-columns: minmax(200px, auto) 30px 72px 82px;
  background:linear-gradient(155deg, rgba(17,34,51,.86), rgba(9,21,33,.74));
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.10);
  border-top:3px solid var(--blue);
  border-bottom:3px solid var(--gold);
  border-radius:16px; overflow:hidden; color:var(--ink);
  box-shadow:0 12px 34px -12px rgba(0,0,0,.6);
  opacity:0;
  transition:transform 400ms cubic-bezier(0.22,1,0.36,1), opacity 300ms ease;
  pointer-events:none;
}
.board.visible { opacity:1; }
.rowhead, .trow { display:contents; }

.h{ font-size:12px; font-weight:800; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--mut); text-align:center; padding:9px 8px 5px; }
.h.name{ text-align:left; padding-left:20px; grid-column:1 / 3; color:var(--gold2); }
.h.sets-h, .cell.sets{ background:rgba(92,167,220,0.10); }
.h.cur-h,  .cell.cur { background:rgba(255,255,255,0.03); }

.cell{ padding:12px 16px; }
.cell.name{ display:flex; align-items:center;
  box-shadow:inset 6px 0 0 var(--team-color);
  background:rgba(var(--team-color-rgb), 0.16); padding-left:14px; }
.cell.name .tname{ font-size:23px; font-weight:800; white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; color:var(--team-text-color); }

.ball-badge{ display:none; margin-left:10px; font-size:11px; font-weight:800; letter-spacing:.06em;
  text-transform:uppercase; padding:3px 8px; border-radius:5px; flex-shrink:0; }
.ball-badge.set{ display:inline-block; background:rgba(92,167,220,.22); color:var(--blue); }
.ball-badge.match{ display:inline-block; background:rgba(205,168,87,.26); color:var(--gold2); }

.cell.to{ display:flex; align-items:center; justify-content:center; padding:8px 0;
  background:rgba(var(--team-color-rgb), 0.16); }
.cell.to .tos{ display:flex; flex-direction:column; align-items:center; gap:5px; }
.cell.to .to-icon{ width:15px; height:15px; color:rgba(255,255,255,0.18); flex-shrink:0; display:block; }
.cell.to .to-icon.taken{ color:#e0655a; }

.cell.sets, .cell.cur{ text-align:center; font-variant-numeric:tabular-nums;
  display:flex; align-items:center; justify-content:center; }
.cell.sets{ font-size:26px; font-weight:800; color:var(--mut); }
.cell.cur { font-size:36px; font-weight:900;
  color:var(--team-num-color); -webkit-text-stroke:var(--team-num-stroke); }

/* Team-Identität: Grün links, Schwarz rechts (schwarze Zahl immer mit hellem Rand) */
.trow[data-side="green"]{
  --team-color:#57A639; --team-color-rgb:87,166,57;
  --team-text-color:#7ed257;
  --team-num-color:#57A639; --team-num-stroke:0;
}
.trow[data-side="black"]{
  --team-color:#0c0f14; --team-color-rgb:12,15,20;
  --team-text-color:#e9edf2;
  --team-num-color:#0c0f14; --team-num-stroke:1.6px var(--black-key);
}
.trow[data-side="black"] .cell{ border-top:1px solid rgba(255,255,255,0.08); }
/* Leader: dezenter Glow statt Gold (kein Gold für Teams) */
.trow.leader .cell.cur{ filter:drop-shadow(0 3px 12px rgba(255,255,255,.14)); }


.stage{ position:fixed; inset:0; overflow:hidden;
  background:radial-gradient(60% 50% at 50% 42%, rgba(120,150,110,.10), transparent 70%),
  linear-gradient(180deg,#1c2a20,#141d17 60%,#0e140f); }
.stage::before{ content:""; position:absolute; inset:0;
  background:repeating-linear-gradient(90deg, rgba(255,255,255,.015) 0 2px, transparent 2px 60px); pointer-events:none; }
#board{ left:34px; bottom:34px; }

</style>
</head>
<body>
<div class="stage"></div>
<div id="board" class="board">
  <div class="rowhead">
    <div id="tourney" class="h name"></div>
    <div class="h sets-h">Sätze</div>
    <div class="h cur-h">Tore</div>
  </div>
  <div class="trow" data-side="green">
    <div class="cell name"><span class="tname">---</span><span class="ball-badge"></span></div>
    <div class="cell to"><span class="tos"></span></div>
    <div class="cell sets">0</div>
    <div class="cell cur">0</div>
  </div>
  <div class="trow" data-side="black">
    <div class="cell name"><span class="tname">---</span><span class="ball-badge"></span></div>
    <div class="cell to"><span class="tos"></span></div>
    <div class="cell sets">0</div>
    <div class="cell cur">0</div>
  </div>
</div>

<script>
const el = document.getElementById('board');
const tourneyEl = document.getElementById('tourney');
const rows = { green: el.querySelector('.trow[data-side="green"]'), black: el.querySelector('.trow[data-side="black"]') };
const FALLBACK = { green:'---', black:'---' };
const CLOCK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`;
const paintSide = (side, score, name, isLeader, ballStatus) => {
  const row = rows[side];
  row.querySelector('.tname').textContent = name || FALLBACK[side];
  row.querySelector('.sets').textContent = score != null ? (score.sets ?? 0) : '—';
  row.querySelector('.cur').textContent  = score != null ? (score.goals ?? 0) : '—';
  const tos = row.querySelector('.tos');
  const taken = score != null ? Math.max(0, Math.min(2, Number(score.timeouts) || 0)) : 0;
  tos.innerHTML = '';
  for (let i = 0; i < 2; i++){ const s=document.createElement('span'); s.className='to-icon'+(i<taken?' taken':''); s.innerHTML=CLOCK_SVG; tos.appendChild(s); }
  row.classList.toggle('leader', isLeader);
  const badge = row.querySelector('.ball-badge'); badge.className='ball-badge';
  if (ballStatus?.matchBall){ badge.classList.add('match'); badge.textContent='Match Ball'; }
  else if (ballStatus?.setBall){ badge.classList.add('set'); badge.textContent='Set Ball'; }
  else badge.textContent='';
};
const render = (ms) => {
  tourneyEl.textContent = ms.tournament?.round ?? '';
  const a = ms.matchActive === true;
  paintSide('green', a?ms.score?.green??{}:null, a?ms.teams?.green?.name:null, a&&ms.leader==='green', a?ms.ballStatus?.green:null);
  paintSide('black', a?ms.score?.black??{}:null, a?ms.teams?.black?.name:null, a&&ms.leader==='black', a?ms.ballStatus?.black:null);
  el.classList.add('visible');
};
const FRAMES = [
  { tournament:{round:'Halbfinale'}, matchActive:true,
    teams:{green:{name:'Robert Steinmann / Martin Felder'}, black:{name:'Andras Toth / Markus Bernecker'}},
    score:{green:{goals:3,sets:1,timeouts:1}, black:{goals:2,sets:0,timeouts:0}}, leader:'green',
    ballStatus:{green:{setBall:true}, black:{}} },
  { tournament:{round:'Halbfinale'}, matchActive:true,
    teams:{green:{name:'Robert Steinmann / Martin Felder'}, black:{name:'Andras Toth / Markus Bernecker'}},
    score:{green:{goals:4,sets:1,timeouts:1}, black:{goals:4,sets:1,timeouts:1}}, leader:null,
    ballStatus:{green:{}, black:{}} },
  { tournament:{round:'Final'}, matchActive:true,
    teams:{green:{name:'Silvan Zuber / Viktor Varga'}, black:{name:'Robert Steinmann / Martin Felder'}},
    score:{green:{goals:6,sets:2,timeouts:0}, black:{goals:5,sets:2,timeouts:2}}, leader:'green',
    ballStatus:{green:{matchBall:true}, black:{}} },
  { tournament:{round:'Vorrunde'}, matchActive:false,
    teams:{green:{name:null}, black:{name:null}}, score:{green:{},black:{}} },
];
let i=0; const loop=()=>{ render(FRAMES[i%FRAMES.length]); i++; setTimeout(loop, 3000); }; loop();
