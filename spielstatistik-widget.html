<style>
:root{
  --blue:#5ca7dc; --navy:#0d273d; --navy2:#0a1f31; --navy3:#081826;
  --gold:#cda857; --gold2:#e9c475;
  --green:#57A639; --black:#0b0f14; --black-key:rgba(232,238,246,.92);
  --ink:#f3f7fb; --mut:rgba(228,238,248,.62); --dim:rgba(228,238,248,.38);
  --card:linear-gradient(155deg,rgba(17,34,51,.80),rgba(9,21,33,.66));
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Nunito Sans',system-ui,sans-serif; color:var(--ink); overflow:hidden; width:100vw; height:100vh;
  background:radial-gradient(80% 60% at 20% 0%,rgba(92,167,220,.16),transparent 60%),
  radial-gradient(70% 60% at 100% 100%,rgba(205,168,87,.12),transparent 60%),
  linear-gradient(180deg,var(--navy),var(--navy2) 55%,var(--navy3));
  display:flex; align-items:center; justify-content:center; padding:2.4vh 2.4vw}
.card{position:relative; width:100%; height:100%; background:var(--card); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.10); border-top:3px solid var(--blue); border-bottom:3px solid var(--gold);
  border-radius:24px; box-shadow:0 10px 30px -12px rgba(0,0,0,.55); display:flex; flex-direction:column; padding:2vh 2.6vw; overflow:hidden}
.top{flex:none; display:flex; align-items:center; gap:1.2vw}
.emb{height:7.6vh; width:auto; flex:none; filter:drop-shadow(0 2px 10px rgba(0,0,0,.4))}
.dyp{font-weight:900; font-size:1.55vh; letter-spacing:.22em; text-transform:uppercase; color:var(--gold2)}
.spacer{flex:1}
.scoremini{display:flex; align-items:center; gap:.7vw; font-weight:800; font-size:2vh; color:var(--mut); max-width:48vw}
.scoremini .who{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:17vw}
.scoremini .who.g{color:var(--green)} .scoremini .who.k{color:#e9edf2}
.scoremini b{font-size:3vh; font-variant-numeric:tabular-nums} .scoremini b.g{color:var(--green)}
.scoremini b.k{color:#fff; -webkit-text-stroke:.6px var(--black-key)} .scoremini .col{color:var(--dim)}
.stage{flex:1; min-height:0; position:relative}
.slide{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  text-align:center; opacity:0; transform:translateY(2vh) scale(.985); transition:opacity .5s ease, transform .5s cubic-bezier(.22,.61,.24,1)}
.slide.on{opacity:1; transform:none} .slide.out{opacity:0; transform:translateY(-1.6vh) scale(.99); transition:opacity .4s, transform .4s}
.shead{flex:none; width:100%; display:flex; flex-direction:column; align-items:center; padding-top:.6vh}
.kicker{display:inline-flex; align-items:center; gap:1vw; font-weight:900; font-size:1.8vh; letter-spacing:.2em; text-transform:uppercase; color:var(--gold2)}
.kicker::before{content:""; width:3.4vw; max-width:44px; height:2px; background:var(--gold)}
.stitle{font-weight:900; font-size:5.4vh; line-height:.98; letter-spacing:-.015em; margin:.7vh 0 .3vh}
.stitle .em{color:var(--gold2)}
.rowtag{display:inline-flex; font-weight:900; font-size:1.5vh; letter-spacing:.08em; text-transform:uppercase; color:var(--gold);
  border:1px solid rgba(205,168,87,.42); background:rgba(205,168,87,.1); border-radius:9px; padding:.4vh 1vw; vertical-align:middle}
.sbody{flex:1; width:100%; min-height:0; display:flex; align-items:center; justify-content:center}
.explain{flex:none; width:100%; display:flex; align-items:flex-start; justify-content:center; gap:.8vw; padding:0 4vw; margin-top:1vh}
.explain .ex-ic{flex:none; margin-top:.2vh} .explain .ex-ic svg{width:2vh; height:2vh; color:var(--gold)}
.ex-tx{max-width:86vw; text-align:left}
.ex-main{font-size:1.6vh; font-weight:700; color:var(--mut); line-height:1.3}
.ex-leg{font-size:1.35vh; font-weight:700; color:var(--dim); line-height:1.3; margin-top:.2vh}
.ex-main b,.ex-leg b{color:var(--gold2); font-weight:900}
.dots{flex:none; display:flex; align-items:center; justify-content:center; gap:1vw; margin-top:1vh}
.dot{width:2.2vw; max-width:34px; height:5px; border-radius:3px; background:rgba(255,255,255,.16); overflow:hidden; position:relative}
.dot.done{background:rgba(205,168,87,.4)}
.dot.act::after{content:""; position:absolute; inset:0; width:0; background:var(--gold); border-radius:3px; animation:fill var(--dur,5s) linear forwards}
@keyframes fill{to{width:100%}}
.fig{fill:currentColor}

/* ===== THEME A: Taktik-Tisch ===== */
.duo{display:flex; align-items:center; justify-content:center; gap:1.6vw; width:100%; flex:1}
.tcol{flex:0 0 24%; display:flex; flex-direction:column; align-items:center; gap:.5vh}
.tname{display:block; font-weight:900; font-size:3vh; line-height:1.14; text-align:center; max-width:100%}
.tname .fig{display:inline-block; height:3.1vh; width:auto; vertical-align:-.45vh; margin-right:.4vw}
.tname.g{color:var(--green)} .tname.g .fig{fill:var(--green)}
.tname.k{color:#e9edf2} .tname.k .fig{fill:#0c0f14; stroke:var(--black-key); stroke-width:3}
.bignum{font-weight:900; line-height:.82; font-variant-numeric:tabular-nums; letter-spacing:-.03em; font-size:14.5vh}
.bignum .u{font-size:5vh}
.bignum.g{color:var(--green); text-shadow:0 6px 24px rgba(87,166,57,.3)}
.bignum.k{color:#0c0f14; -webkit-text-stroke:2.4px var(--black-key)}
.subnum{font-weight:800; font-size:2vh; color:var(--mut)}
.pitchbox{flex:1; max-width:50%; display:flex; flex-direction:column; align-items:center; gap:.9vh}
.pitch{width:100%; height:auto; max-height:38vh; display:block; filter:drop-shadow(0 8px 20px rgba(0,0,0,.4))}
.ptag{font-weight:900; font-size:1.5vh; letter-spacing:.06em; color:var(--gold2); text-transform:uppercase}
.ptag .ar{color:var(--mut); font-weight:800; margin-left:.6vw}
/* Anteil-Balken unter dem Tisch */
.abar{width:86%; margin-top:.2vh}
.duelbar{position:relative; width:100%; height:2.2vh; border-radius:1.2vh; overflow:hidden; background:rgba(255,255,255,.08)}
.db{position:absolute; top:0; bottom:0; width:0; transition:width 1.05s cubic-bezier(.2,.7,.2,1)}
.db.g{left:0; background:linear-gradient(90deg,rgba(87,166,57,.6),var(--green))}
.db.k{right:0; background:linear-gradient(270deg,rgba(255,255,255,.55),#e9edf2)}
.dbpin{position:absolute; top:-1px; bottom:-1px; width:2px; background:var(--navy2); z-index:2}
.dbshare{display:flex; justify-content:space-between; width:100%; margin-top:.3vh; font-weight:900; font-size:1.5vh; font-variant-numeric:tabular-nums}
.dbshare .g{color:var(--green)} .dbshare .k{color:#e9edf2}
/* goalie A */
.gkwrap{display:flex; flex-direction:column; align-items:center; gap:1.4vh; width:100%; flex:1; justify-content:center}
.gktop{display:flex; align-items:center; justify-content:center; gap:1.6vw; width:100%}
.gkhero{flex:0 0 22%; text-align:center}
.gkhero .hl{font-weight:800; font-size:1.6vh; color:var(--mut); text-transform:uppercase; letter-spacing:.04em}
.gkhero .hv{font-weight:900; font-size:8.2vh; line-height:.9; font-variant-numeric:tabular-nums}
.gkhero.g .hv{color:var(--green)} .gkhero.k .hv{color:#0c0f14; -webkit-text-stroke:2px var(--black-key)}
.gkpitch{flex:1; max-width:44%}
.gkrow{display:flex; gap:1vw; width:92%; justify-content:center}
.gcell{flex:1; background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:.9vh .6vw; text-align:center}
.gcell .gl{font-weight:800; font-size:1.45vh; color:var(--mut); text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.gcell .gr{display:flex; align-items:baseline; justify-content:center; gap:.8vw; margin-top:.3vh}
.gcell .gv{font-weight:900; font-size:3.5vh; font-variant-numeric:tabular-nums}
.gcell .gv.g{color:var(--green)} .gcell .gv.k{color:#0c0f14; -webkit-text-stroke:1.4px var(--black-key)}
.gcell .sep{color:var(--dim); font-weight:900; font-size:1.5vh}
/* special A */
.speclist{display:flex; flex-direction:column; gap:2vh; width:78%; flex:1; justify-content:space-evenly; margin-top:.5vh}
.specrow{display:flex; align-items:center; justify-content:space-between; gap:2vw; background:linear-gradient(120deg,rgba(205,168,87,.12),rgba(9,21,33,.5));
  border:1px solid rgba(205,168,87,.34); border-radius:16px; padding:2.2vh 2.4vw}
.specrow .sn{font-weight:900; font-size:2.8vh}
.specrow .sp{display:flex; align-items:baseline; gap:2.2vw}
.specrow .pair{display:flex; align-items:baseline; gap:.6vw}
.specrow .pv{font-weight:900; font-size:5.4vh; font-variant-numeric:tabular-nums; line-height:1}
.specrow .pv.g{color:var(--green)} .specrow .pv.k{color:#0c0f14; -webkit-text-stroke:2px var(--black-key)}
.specrow .pv.z{opacity:.4; -webkit-text-stroke:0; color:var(--dim)}
.specrow .pt{font-size:1.5vh; font-weight:800; color:var(--dim); max-width:11vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.sbcol{font-weight:900; font-size:11vh; color:var(--dim); flex:none; align-self:center}
</style>

<script>/* TFCZ Tischfussball-Grafik (Top-Down). BEIDE Teams: grün nach rechts, schwarz nach links.
   Grüne Seite = links. Stangen (links->rechts), Figuren in Team-Farbe:
   0 Torwart grün(1) · 1 2er grün · 2 3er schwarz · 3 5er grün · 4 5er schwarz · 5 3er grün · 6 2er schwarz · 7 Torwart schwarz(1)
   cfg: { gHi:[idx], kHi:[idx], gArrow:[x1,x2], kArrow:[x1,x2], gZone:[x1,x2], kZone:[x1,x2], losses:[{x,team}] } */
window.PITCH = (function(){
  const RODS=[
    {x:58, men:1, team:'g'}, {x:98, men:2, team:'g'}, {x:138,men:3, team:'k'}, {x:180,men:5, team:'g'},
    {x:260,men:5, team:'k'}, {x:302,men:3, team:'g'}, {x:342,men:2, team:'k'}, {x:382,men:1, team:'k'}
  ];
  const GREEN='#57A639', GLINE='#6fce4e', WHITE='#eef1f4';
  // Gleiche Abstände: Bande–Figur = Figur–Figur (n+1 gleiche Lücken über die Feldhöhe)
  const ys=n=>{const a=[],W0=20,W1=180; for(let i=0;i<n;i++) a.push(W0+(W1-W0)*(i+1)/(n+1)); return a;};

  function arrow(a, col, marker, up){
    if(!a) return '';
    const [x1,x2]=a, mx=(x1+x2)/2, cy=up?64:136;
    return `<path d="M ${x1} 100 Q ${mx} ${cy} ${x2} 100" fill="none" stroke="${col}" stroke-width="4.5"
      stroke-linecap="round" marker-end="url(#${marker})"/>`;
  }
  function band(idx, col, fill){ const r=RODS[idx]; if(!r) return '';
    return `<rect x="${r.x-13}" y="27" width="26" height="146" rx="8" fill="${fill}" stroke="${col}" stroke-width="1.6"/>`; }
  function zone(z, col){ if(!z) return '';
    return `<rect x="${z[0]}" y="30" width="${z[1]-z[0]}" height="140" rx="11" fill="rgba(255,255,255,.03)"
      stroke="${col}" stroke-width="2" stroke-dasharray="7 6"/>`; }
  function lossMark(m){ const c=m.team==='g'?GLINE:WHITE;
    return `<g transform="translate(${m.x},100)" filter="url(#pglow)">
      <circle r="13" fill="rgba(10,20,30,.5)" stroke="${c}" stroke-width="2.4" stroke-dasharray="4.5 3.5"/>
      <path d="M-6 -6 L6 6 M6 -6 L-6 6" stroke="${c}" stroke-width="3" stroke-linecap="round"/></g>`; }

  function pitchSVG(cfg={}){
    const gHi=new Set(cfg.gHi||[]), kHi=new Set(cfg.kHi||[]);
    let bands='', rods='', figs='';
    (cfg.gHi||[]).forEach(i=>bands+=band(i, 'rgba(87,166,57,.7)', 'rgba(87,166,57,.16)'));
    (cfg.kHi||[]).forEach(i=>bands+=band(i, 'rgba(238,241,244,.65)', 'rgba(238,241,244,.12)'));
    RODS.forEach((r,i)=>{
      const on=gHi.has(i)||kHi.has(i);
      rods+=`<line x1="${r.x}" y1="30" x2="${r.x}" y2="170" stroke="${on?'rgba(240,244,248,.55)':'rgba(180,198,216,.34)'}" stroke-width="${on?3.2:2.6}" stroke-linecap="round"/>`;
      ys(r.men).forEach(y=>{
        const stroke=r.team==='k'?' stroke="rgba(240,244,248,.9)" stroke-width="1.7"':'';
        figs+=`<circle cx="${r.x}" cy="${y}" r="7" fill="${r.team==='g'?GREEN:'#12161c'}"${stroke}${on?' filter="url(#pglow)"':''}/>`;
      });
    });
    const zones = zone(cfg.gZone, GREEN) + zone(cfg.kZone, WHITE);
    const arrows = arrow(cfg.gArrow, GLINE, 'ahg', true) + arrow(cfg.kArrow, WHITE, 'ahk', false);
    const losses = (cfg.losses||[]).map(lossMark).join('');
    return `<svg viewBox="0 0 440 200" class="pitch" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="ahg" viewBox="0 0 12 12" refX="8" refY="6" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L12 6 L0 12 z" fill="${GLINE}"/></marker>
        <marker id="ahk" viewBox="0 0 12 12" refX="8" refY="6" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L12 6 L0 12 z" fill="${WHITE}"/></marker>
        <filter id="pglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="pfg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#123049"/><stop offset="1" stop-color="#0b2033"/></linearGradient>
      </defs>
      <rect x="26" y="20" width="388" height="160" rx="16" fill="url(#pfg)" stroke="rgba(92,167,220,.42)" stroke-width="2"/>
      <line x1="220" y1="22" x2="220" y2="178" stroke="rgba(92,167,220,.26)" stroke-width="2"/>
      <circle cx="220" cy="100" r="24" fill="none" stroke="rgba(92,167,220,.26)" stroke-width="2"/>
      <rect x="9" y="72" width="15" height="56" rx="5" fill="#57A639" opacity=".85"/>
      <rect x="416" y="72" width="15" height="56" rx="5" fill="#12161c" stroke="rgba(240,244,248,.6)" stroke-width="1.5"/>
      ${bands}${zones}${rods}${figs}${arrows}${losses}
    </svg>`;
  }

  const VIEW = {
    pass   : { gHi:[3,5], kHi:[4,2], gArrow:[180,302], kArrow:[260,138] },
    shoot  : { gHi:[5],   kHi:[2],   gArrow:[302,412], kArrow:[138,28] },
    goalie : { gHi:[0,1], kHi:[7,6], gZone:[40,120], kZone:[320,400], gArrow:[100,180], kArrow:[340,260] },
    midgoal: { gHi:[3],   kHi:[4],   gArrow:[180,412], kArrow:[260,28] },   // 5er direkt aufs Tor
    losses : { losses:[ {x:78,team:'g'}, {x:302,team:'g'}, {x:362,team:'k'}, {x:138,team:'k'} ] },
    all    : {}
  };
  return { pitchSVG, VIEW };
})();
</script>
<script>
window.THEME_SLIDE=function(s){
  const D=window.D, q=window.q, share=window.share, FIG=window.FIG, P=window.PITCH;
  if(s.type==='score'){
    const gl=D.g.score<D.b.score, bl=D.b.score<D.g.score;
    return `<div class="shead"><div class="kicker">${D.title} · Endstand</div>
      <div class="stitle">Spiel<span class="em">statistik</span></div></div>
      <div class="sbody"><div class="duo">
        <div class="tcol"><div class="tname g">${FIG}${D.g.name}</div>
          <div class="bignum g" ${gl?'style="opacity:.5"':''}><span data-count="${D.g.score}" data-int="1">0</span></div></div>
        <div class="pitchbox">${P.pitchSVG(P.VIEW.all)}<div class="ptag">Tischfussball · Endstand</div></div>
        <div class="tcol"><div class="tname k">${FIG}${D.b.name}</div>
          <div class="bignum k" ${bl?'style="opacity:.5"':''}><span data-count="${D.b.score}" data-int="1">0</span></div></div>
      </div></div>`;
  }
  if(s.type==='quota'){
    const G=q(D.g[s.key].m), B=q(D.b[s.key].m);
    const gS=share(G.pct,B.pct), kS=Math.round((100-gS)*10)/10;
    return `<div class="shead"><div class="kicker">${s.kicker}</div>
      <div class="stitle">${s.title} <span class="rowtag">${s.tag}</span></div></div>
      <div class="sbody"><div class="duo">
        <div class="tcol"><div class="tname g">${FIG}${D.g.name}</div>
          <div class="bignum g"><span data-count="${G.pct}" data-dec="1">0</span><span class="u">%</span></div>
          <div class="subnum">${G.txt} pro Ballbesitz</div></div>
        <div class="pitchbox">${P.pitchSVG(P.VIEW[s.view])}
          <div class="ptag">${s.tag}<span class="ar">Angriffsrichtung →</span></div>
          <div class="abar"><div class="duelbar"><span class="db g" data-w="${gS}"></span><span class="db k" data-w="${kS}"></span><span class="dbpin" style="left:${gS}%"></span></div>
            <div class="dbshare"><span class="g">Anteil ${gS}%</span><span class="k">${kS}%</span></div></div></div>
        <div class="tcol"><div class="tname k">${FIG}${D.b.name}</div>
          <div class="bignum k"><span data-count="${B.pct}" data-dec="1">0</span><span class="u">%</span></div>
          <div class="subnum">${B.txt} pro Ballbesitz</div></div>
      </div></div>`;
  }
  if(s.type==='goalie'){
    const gc=q(D.g.gk.clear), bc=q(D.b.gk.clear);
    const mini=[{k:'steals',l:'Erobert'},{k:'goals',l:'Tore'},{k:'turn',l:'Verloren'},{k:'to5',l:'→ 5er'},{k:'to3',l:'→ 3er'}];
    return `<div class="shead"><div class="kicker">${s.kicker}</div>
      <div class="stitle">${s.title} <span class="rowtag">${s.tag}</span></div></div>
      <div class="sbody"><div class="gkwrap">
        <div class="gktop">
          <div class="gkhero g"><div class="hl">Rausgespielt</div><div class="hv"><span data-count="${gc.pct}" data-dec="1">0</span>%</div></div>
          <div class="gkpitch">${P.pitchSVG(P.VIEW.goalie)}</div>
          <div class="gkhero k"><div class="hl">Rausgespielt</div><div class="hv"><span data-count="${bc.pct}" data-dec="1">0</span>%</div></div>
        </div>
        <div class="gkrow">${mini.map(m=>`<div class="gcell"><div class="gl">${m.l}</div>
          <div class="gr"><span class="gv g">${D.g.gk[m.k]}</span><span class="sep">:</span><span class="gv k">${D.b.gk[m.k]}</span></div></div>`).join('')}</div>
      </div></div>`;
  }
  if(s.type==='special'){
    return `<div class="shead"><div class="kicker">${s.kicker}</div><div class="stitle">${s.title}</div></div>
      <div class="sbody"><div class="speclist">${window.specActive.map(it=>{
        const a=D.g.sp[it.k]||0,b=D.b.sp[it.k]||0;
        return `<div class="specrow"><span class="sn">${it.l}</span><span class="sp">
          <span class="pair"><span class="pv ${a?'g':'z'}"><span data-count="${a}" data-int="1">0</span></span><span class="pt">${D.g.name}</span></span>
          <span class="pair"><span class="pv ${b?'k':'z'}"><span data-count="${b}" data-int="1">0</span></span><span class="pt">${D.b.name}</span></span>
        </span></div>`;}).join('')}</div></div>`;
  }
};
</script>
<script>/* Gemeinsame Engine für die 3 neuen TFCZ-Stat-Designs.
   Erwartet: window.THEME_SLIDE(slide) -> HTML des Slide-Körpers.
   Nutzt window.PITCH (pitch.js). Daten/Reihenfolge identisch zum Rotator. */
(function(){
const FIG = `<svg class="fig" viewBox="0 0 60 92" aria-hidden="true">
  <circle cx="30" cy="12" r="9"/><rect x="3" y="26" width="54" height="9" rx="4.5"/>
  <path d="M21 22 h18 a6 6 0 0 1 6 6 v22 a6 6 0 0 1-6 6 h-18 a6 6 0 0 1-6-6 v-22 a6 6 0 0 1 6-6 z"/>
  <path d="M22 59 h6 v24 a3 3 0 0 1-6 0 z"/><path d="M32 59 h6 v24 a3 3 0 0 1-6 0 z"/></svg>`;
window.FIG=FIG;

/* HIER ANPASSEN: Event + Doppel-Namen */
const D = {
  title:'STRT Pro · Zürich Open #2',
  g:{ players:['Luca','Jan'], score:3, pass:{m:[7,9],r:[7,10],p:[5,6]}, shoot:{m:[8,11],r:[8,11],p:[5,6]},
      gk:{clear:[5,14],steals:2,goals:2,turn:4,to5:1,to3:3}, sp:{five:1,lostBack:4,lostFront:2,foet:0,own:0} },
  b:{ players:['Timo','Ramon'], score:2, pass:{m:[10,14],r:[10,16],p:[4,7]}, shoot:{m:[2,10],r:[2,12],p:[1,2]},
      gk:{clear:[2,7],steals:4,goals:1,turn:3,to5:1,to3:0}, sp:{five:3,lostBack:3,lostFront:7,foet:0,own:0} }
};
D.g.name=D.g.players.join(' & '); D.b.name=D.b.players.join(' & ');
// Kurzform (nur Vornamen) für die kompakte Kopfzeile
D.g.short=D.g.players.map(p=>p.split(' ')[0]).join(' & '); D.b.short=D.b.players.map(p=>p.split(' ')[0]).join(' & ');
window.D=D;
const q=f=>f&&f[1]?{pct:Math.round(f[0]/f[1]*1000)/10,txt:`${f[0]}/${f[1]}`}:null;
const share=(a,b)=>(a+b>0?Math.round(a/(a+b)*1000)/10:50);
window.q=q; window.share=share;

const SPECMETA=[
  {k:'foet',l:'Föteli', ex:'Torwart spielt raus, Ball prallt am Gegner ab und geht ins eigene Tor'},
  {k:'own',l:'Eigentor', ex:'der Ball geht ins eigene Tor'}
];
const specActive=SPECMETA.filter(s=>(D.g.sp[s.k]||0)>0||(D.b.sp[s.k]||0)>0);
window.specActive=specActive;
const anyFive = (D.g.sp.five||0)>0 || (D.b.sp.five||0)>0;
const anyLoss = ((D.g.sp.lostBack||0)+(D.g.sp.lostFront||0)+(D.b.sp.lostBack||0)+(D.b.sp.lostFront||0))>0;

const SLIDES=[
  { type:'score', view:'all',
    ex:'Auswertung des soeben beendeten Spiels — Endstand oben rechts immer sichtbar.' },
  { type:'quota', key:'pass', view:'pass', kicker:'Aufbau', title:'Pass 5 → 3', tag:'5er → 3er',
    plain:'Der Pass von der 5er- auf die 3er-Reihe — damit beginnt fast jeder Angriff.',
    ex:'Der Pass vom Mittelfeld in den Sturm — Start fast jedes Angriffs.',
    leg:'pro Ballbesitz = Serie ohne Ballverlust · Versuch = jeder einzelne Ball · ab 3:3 = Crunchtime' },
  { type:'quota', key:'shoot', view:'shoot', kicker:'Abschluss', title:'Schuss aus dem Sturm', tag:'3er-Reihe',
    plain:'Der Torschuss aus der vordersten 3er-Reihe — hier fallen die meisten Tore.',
    ex:'Der Abschluss aus der vordersten Reihe — hier fallen die meisten Tore.',
    leg:'pro Ballbesitz = Serie ohne Ballverlust · Versuch = jeder einzelne Ball · ab 3:3 = Crunchtime' },
  { type:'goalie', view:'goalie', kicker:'Torwart', title:'Torwartzone', tag:'Torwart + 2er',
    plain:'Torwart- und 2er-Stange zusammen — hier wird der Ball erobert und der Angriff eingeleitet.',
    ex:'Torwart- und 2er-Stange zusammen — hier wird erobert und der Angriff eingeleitet.',
    leg:'Rausgespielt = Quote sauber aus der eigenen Zone · Werte je Team: grün : schwarz' }
];
if(anyFive) SLIDES.push({ type:'midgoal', view:'midgoal', kicker:'Highlight', title:'Tor aus dem Mittelfeld', tag:'aus der 5er-Reihe',
  ex:'Ein Treffer direkt aus der 5er-Reihe — selten und spektakulär.',
  leg:'Der Ball geht direkt von der Mittelfeld-Stange ins gegnerische Tor.' });
if(anyLoss) SLIDES.push({ type:'losses', view:'losses', kicker:'Ballkontrolle', title:'Ballverluste', tag:'hinten & vorne',
  ex:'Wie oft der Ball an den Gegner ging — aufgeteilt nach Zone.',
  leg:'Hinten = eigene Torwart-/2er-Zone · Vorne = im Angriff (3er-Reihe)' });
if(specActive.length) SLIDES.push({ type:'special', kicker:'Besondere Momente', title:'Was heraus&shy;stach',
  ex: specActive.map(s=>`<b>${s.l}:</b> ${s.ex}`).join(' · ') });
window.SLIDES=SLIDES;

/* Kopf */
document.getElementById('dyp').textContent=D.title;
document.getElementById('scoremini').innerHTML=
  `<span class="who g">${D.g.short}</span><b class="g">${D.g.score}</b><span class="col">:</span><b class="k">${D.b.score}</b><span class="who k">${D.b.short}</span>`;

/* Erklärung unten */
function explainHTML(s){
  if(!s.ex && !s.leg) return '';
  return `<div class="explain">
    <div class="ex-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div>
    <div class="ex-tx"><div class="ex-main">${s.ex||''}</div>${s.leg?`<div class="ex-leg">${s.leg}</div>`:''}</div>
  </div>`;
}

/* Count-up + Balken */
function animate(el){
  el.querySelectorAll('[data-count]').forEach(n=>{
    const to=parseFloat(n.dataset.count), dec=n.dataset.dec?1:0, dur=850, t0=performance.now();
    (function tick(t){const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3), v=to*e;
      n.textContent=dec?v.toFixed(1):Math.round(v); if(k<1) requestAnimationFrame(tick);})(t0);
  });
  requestAnimationFrame(()=>el.querySelectorAll('[data-w]').forEach(f=>f.style.width=f.dataset.w+'%'));
}

/* Dots */
const dotsEl=document.getElementById('dots');
dotsEl.innerHTML=SLIDES.map(()=>`<span class="dot"></span>`).join('');
const dots=[...dotsEl.children];

/* Geteilte Slides für Tisch-Screens (Tor aus Mittelfeld / Ballverluste) — funktioniert in jedem Design */
function sharedSlide(s){
  const P=window.PITCH, D=window.D;
  const tname=team=>{const nm=team==='g'?D.g.name:D.b.name, col=team==='g'?'#57A639':'#e9edf2';
    return `<div style="display:block;text-align:center;font-weight:900;font-size:3vh;line-height:1.14;color:${col}">
      <svg viewBox="0 0 60 92" style="display:inline-block;height:3.1vh;width:auto;vertical-align:-.45vh;margin-right:.4vw;fill:currentColor"><circle cx="30" cy="12" r="9"/><rect x="3" y="26" width="54" height="9" rx="4.5"/>
      <path d="M21 22 h18 a6 6 0 0 1 6 6 v22 a6 6 0 0 1-6 6 h-18 a6 6 0 0 1-6-6 v-22 a6 6 0 0 1 6-6 z"/><path d="M22 59 h6 v24 a3 3 0 0 1-6 0 z"/><path d="M32 59 h6 v24 a3 3 0 0 1-6 0 z"/></svg>${nm}</div>`;};
  const big=(val,team)=>{const col=team==='g'?'color:#57A639;text-shadow:0 6px 24px rgba(87,166,57,.3)':'color:#0c0f14;-webkit-text-stroke:2.6px rgba(232,238,246,.92)';
    return `<div style="font-weight:900;font-size:14.5vh;line-height:.82;font-variant-numeric:tabular-nums;letter-spacing:-.02em;${col}"><span data-count="${val}" data-int="1">0</span></div>`;};
  const sub=t=>`<div style="font-weight:800;font-size:2vh;color:rgba(228,238,248,.62)">${t}</div>`;
  const col=(inner)=>`<div style="flex:0 0 24%;display:flex;flex-direction:column;align-items:center;gap:.5vh">${inner}</div>`;
  const flank=(view,g,k)=>`<div class="shead"><div class="kicker">${s.kicker}</div><div class="stitle">${s.title} ${s.tag?`<span class="rowtag">${s.tag}</span>`:''}</div></div>
    <div class="sbody"><div style="display:flex;align-items:center;justify-content:center;gap:1.4vw;width:100%;flex:1">
      ${col(g)}<div style="flex:1;max-width:50%"><div style="filter:drop-shadow(0 8px 20px rgba(0,0,0,.4))">${P.pitchSVG(view)}</div>
      <div style="font-weight:900;font-size:1.5vh;letter-spacing:.06em;color:#e9c475;text-transform:uppercase;text-align:center;margin-top:.8vh">${s.tag} · beide Seiten</div></div>${col(k)}
    </div></div>`;
  if(s.type==='midgoal'){
    return flank(P.VIEW.midgoal, tname('g')+big(D.g.sp.five,'g')+sub('Tore aus der 5er-Reihe'),
                                 tname('k')+big(D.b.sp.five,'k')+sub('Tore aus der 5er-Reihe'));
  }
  if(s.type==='losses'){
    const pair=(back,front,team)=>{const c=team==='g'?'color:#57A639':'color:#0c0f14;-webkit-text-stroke:1.8px rgba(232,238,246,.92)';
      const cell=(l,v)=>`<div style="text-align:center"><div style="font-weight:800;font-size:1.6vh;text-transform:uppercase;letter-spacing:.04em;color:rgba(228,238,248,.5)">${l}</div>
        <div style="font-weight:900;font-size:7vh;line-height:1;font-variant-numeric:tabular-nums;${c}"><span data-count="${v}" data-int="1">0</span></div></div>`;
      return `<div style="display:flex;gap:1.8vw;margin-top:.4vh">${cell('Hinten',back)}${cell('Vorne',front)}</div>`;};
    return flank(P.VIEW.losses, tname('g')+pair(D.g.sp.lostBack,D.g.sp.lostFront,'g'),
                                tname('k')+pair(D.b.sp.lostBack,D.b.sp.lostFront,'k'));
  }
  return '';
}

/* Rotation */
const stage=document.getElementById('stage');
const params=new URLSearchParams(location.search);
const DUR=((parseInt(params.get('dur'))||window.__DUR||5))*1000;
const forced=(typeof window.__SLIDE!=='undefined')?+window.__SLIDE:(params.has('slide')?+params.get('slide'):null);
const freeze=window.__FREEZE||params.has('slide');
let i=forced!=null?Math.max(0,Math.min(SLIDES.length-1,forced)):0, cur=null;
function build(idx){
  const el=document.createElement('div');
  const body=window.THEME_SLIDE(SLIDES[idx]);
  el.className='slide'; el.innerHTML=(body!=null?body:sharedSlide(SLIDES[idx]))+explainHTML(SLIDES[idx]);
  stage.appendChild(el); cur=el;
  requestAnimationFrame(()=>{ el.classList.add('on'); animate(el); });
}
function show(idx){
  if(cur){ const old=cur; old.classList.add('out'); setTimeout(()=>old.remove(),450); setTimeout(()=>build(idx),250); }
  else build(idx);
  dots.forEach((d,k)=>{ d.className='dot'+(k<idx?' done':'')+(k===idx?' act':''); });
  const act=dots[idx]; if(act) act.style.setProperty('--dur',(DUR/1000)+'s');
}
show(i);
if(!freeze) setInterval(()=>{ i=(i+1)%SLIDES.length; show(i); }, DUR);
})();
</script>
</body>
</html>
